<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FFFDF9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="貓咪紀錄">
<title>貓咪照護紀錄</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div id="app">

  <!-- ───────── TOAST ───────── -->
  <div id="toast-wrap"></div>

  <!-- ───────── PAGE: HOME ───────── -->
  <div id="page-home" class="page active">
    <div class="topbar">
      <span class="topbar-title">🐱 今天</span>
      <button class="topbar-action" id="btn-add-record-top" title="快速新增">＋</button>
    </div>
    <div class="scroll-area" id="home-scroll">
      <!-- reminders inject here -->
      <div id="remind-section"></div>
      <!-- cat timelines inject here -->
      <div id="home-timelines"></div>
    </div>
  </div>

  <!-- ───────── PAGE: CALENDAR ───────── -->
  <div id="page-cal" class="page">
    <div class="topbar">
      <span class="topbar-title">📅 月曆</span>
    </div>
    <div class="scroll-area">
      <div class="card">
        <div class="card-body">
          <div class="cal-header">
            <button class="cal-nav" id="cal-prev">‹</button>
            <div class="cal-month" id="cal-month-label"></div>
            <button class="cal-nav" id="cal-next">›</button>
          </div>
          <div class="cal-grid" id="cal-dow"></div>
          <div class="cal-grid" id="cal-days"></div>
        </div>
      </div>
      <div class="card" id="cal-day-detail" style="display:none">
        <div class="card-header">
          <span class="card-title" id="cal-detail-title">— 日紀錄</span>
        </div>
        <div class="card-body" id="cal-detail-body"></div>
      </div>
    </div>
  </div>

  <!-- ───────── PAGE: STATS ───────── -->
  <div id="page-stats" class="page">
    <div class="topbar">
      <span class="topbar-title">📊 統計</span>
    </div>
    <div class="scroll-area">
      <div class="cat-switcher" id="stats-cat-switcher"></div>
      <div class="period-tabs">
        <div class="period-tab active" data-period="week">本週</div>
        <div class="period-tab" data-period="month">本月</div>
      </div>
      <div class="stat-grid" id="stats-grid"></div>
      <div class="card">
        <div class="card-header"><span class="card-title">📈 體重趨勢</span></div>
        <div class="card-body">
          <div class="weight-chart-wrap"><canvas id="weight-chart"></canvas></div>
        </div>
      </div>
      <!-- Monthly report -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">📋 月報</span>
          <select class="form-input btn-sm" id="report-month-sel" style="width:auto;height:32px;padding:0 28px 0 10px;font-size:.78rem;"></select>
        </div>
        <div class="card-body" id="report-body"></div>
        <div style="padding:0 16px 14px;display:flex;gap:8px;">
          <button class="btn btn-secondary btn-sm flex-1" id="btn-export-png">匯出 PNG</button>
          <button class="btn btn-secondary btn-sm flex-1" id="btn-export-pdf">匯出 PDF</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ───────── PAGE: CATS ───────── -->
  <div id="page-cats" class="page">
    <div class="topbar">
      <span class="topbar-title">🐾 我的貓咪</span>
      <button class="topbar-action" id="btn-add-cat">＋</button>
    </div>
    <div class="scroll-area" id="cats-list"></div>
  </div>

  <!-- ───────── PAGE: SETTINGS ───────── -->
  <div id="page-settings" class="page">
    <div class="topbar">
      <span class="topbar-title">⚙️ 設定</span>
    </div>
    <div class="scroll-area">
      <!-- Records search -->
      <div class="card">
        <div class="card-header"><span class="card-title">🔍 搜尋紀錄</span></div>
        <div class="card-body" style="display:flex;flex-direction:column;gap:12px;">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">開始日期</label>
              <input type="date" class="form-input" id="search-date-from">
            </div>
            <div class="form-group">
              <label class="form-label">結束日期</label>
              <input type="date" class="form-input" id="search-date-to">
            </div>
          </div>
          <div class="filter-pills" id="search-type-pills"></div>
          <div class="form-group">
            <input type="text" class="form-input" id="search-keyword" placeholder="關鍵字搜尋…">
          </div>
          <button class="btn btn-primary" id="btn-search">搜尋</button>
        </div>
      </div>
      <div id="search-results"></div>

      <!-- Backup & Restore -->
      <div class="card">
        <div class="card-header"><span class="card-title">💾 備份與還原</span></div>
        <div style="padding:0 0 4px;">
          <div class="setting-item" id="btn-backup-all">
            <div class="setting-icon" style="background:#E8F5E9;">📦</div>
            <div class="setting-text"><div class="setting-title">全部備份</div><div class="setting-desc">匯出所有資料為 JSON</div></div>
            <span class="setting-arrow">›</span>
          </div>
          <div class="setting-item" id="btn-backup-range">
            <div class="setting-icon" style="background:#E3F2FD;">📅</div>
            <div class="setting-text"><div class="setting-title">日期區間備份</div><div class="setting-desc">選擇開始與結束日期</div></div>
            <span class="setting-arrow">›</span>
          </div>
          <div class="setting-item" id="btn-backup-month">
            <div class="setting-icon" style="background:#FFF3E0;">📆</div>
            <div class="setting-text"><div class="setting-title">月份備份</div><div class="setting-desc">選擇特定月份匯出</div></div>
            <span class="setting-arrow">›</span>
          </div>
          <div class="setting-item" id="btn-backup-cat">
            <div class="setting-icon" style="background:#FCE4EC;">🐱</div>
            <div class="setting-text"><div class="setting-title">依貓咪備份</div><div class="setting-desc">選擇單隻或多隻貓咪</div></div>
            <span class="setting-arrow">›</span>
          </div>
          <div class="setting-item" id="btn-restore">
            <div class="setting-icon" style="background:#F3E5F5;">🔄</div>
            <div class="setting-text"><div class="setting-title">還原資料</div><div class="setting-desc">匯入 JSON 備份檔</div></div>
            <span class="setting-arrow">›</span>
          </div>
        </div>
      </div>

      <!-- Weight management -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">⚖️ 體重紀錄</span>
          <button class="btn btn-primary btn-sm" id="btn-add-weight">新增</button>
        </div>
        <div class="card-body" style="padding-top:8px;">
          <div class="cat-switcher" id="weight-cat-switcher" style="margin-bottom:12px;"></div>
          <div id="weight-list"></div>
        </div>
      </div>

      <!-- Reminder settings -->
      <div class="card">
        <div class="card-header"><span class="card-title">🔔 提醒設定</span></div>
        <div id="reminder-settings-list"></div>
      </div>

      <div style="height:8px;"></div>
    </div>
  </div>

  <!-- ───────── BOTTOM NAV ───────── -->
  <nav id="bottom-nav">
    <div class="nav-item active" data-page="home">
      <span class="nav-icon">🏠</span><span>首頁</span>
    </div>
    <div class="nav-item" data-page="cal">
      <span class="nav-icon">📅</span><span>月曆</span>
    </div>
    <div class="nav-item" data-page="stats">
      <span class="nav-icon">📊</span><span>統計</span>
    </div>
    <div class="nav-item" data-page="cats">
      <span class="nav-icon">🐾</span><span>貓咪</span>
    </div>
    <div class="nav-item" data-page="settings">
      <span class="nav-icon">⚙️</span><span>設定</span>
    </div>
  </nav>

</div><!-- /#app -->

<!-- ═══════════════════ MODALS ═══════════════════ -->

<!-- Add/Edit Cat -->
<div class="modal-overlay" id="modal-cat">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="modal-cat-title">新增貓咪</span>
      <button class="modal-close" data-close="modal-cat">✕</button>
    </div>
    <div class="modal-body">
      <div class="photo-upload" id="cat-photo-upload">
        <span class="photo-upload-icon">🐱</span>
        <span class="photo-upload-text">點擊上傳照片</span>
        <input type="file" id="cat-photo-input" accept="image/*">
      </div>
      <input type="hidden" id="cat-edit-id">
      <div class="form-section">
        <div class="form-group">
          <label class="form-label">名字 *</label>
          <input type="text" class="form-input" id="cat-name" placeholder="例如：小橘">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">性別</label>
            <select class="form-input" id="cat-gender">
              <option value="">不填</option>
              <option value="♂ 男">♂ 男</option>
              <option value="♀ 女">♀ 女</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">生日</label>
            <input type="date" class="form-input" id="cat-birthday">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">晶片號碼（選填）</label>
          <input type="text" class="form-input" id="cat-chip" placeholder="15 碼晶片號碼">
        </div>
        <div class="form-group">
          <label class="form-label">初始體重（kg）</label>
          <input type="number" class="form-input" id="cat-weight" placeholder="例如：4.2" step="0.01" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">備註</label>
          <textarea class="form-input" id="cat-note" placeholder="過敏、疾病、個性…"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary flex-1" data-close="modal-cat">取消</button>
      <button class="btn btn-primary flex-1" id="btn-save-cat">儲存</button>
    </div>
  </div>
</div>

<!-- Add/Edit Record -->
<div class="modal-overlay" id="modal-record">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="modal-record-title">新增紀錄</span>
      <button class="modal-close" data-close="modal-record">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="record-edit-id">
      <div class="form-section">
        <div class="form-group">
          <label class="form-label">貓咪 *</label>
          <select class="form-input" id="record-cat"></select>
        </div>
        <div class="form-group">
          <label class="form-label">類型 *</label>
          <select class="form-input" id="record-type"></select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">日期 *</label>
            <input type="date" class="form-input" id="record-date">
          </div>
          <div class="form-group">
            <label class="form-label">時間 *</label>
            <input type="time" class="form-input" id="record-time">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">備註</label>
          <textarea class="form-input" id="record-note" placeholder="選填…" style="min-height:60px;"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary flex-1" data-close="modal-record">取消</button>
      <button class="btn btn-primary flex-1" id="btn-save-record">儲存</button>
    </div>
  </div>
</div>

<!-- Add Weight -->
<div class="modal-overlay" id="modal-weight">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="modal-weight-title">新增體重</span>
      <button class="modal-close" data-close="modal-weight">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="weight-edit-id">
      <div class="form-section">
        <div class="form-group">
          <label class="form-label">貓咪 *</label>
          <select class="form-input" id="weight-cat"></select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">日期 *</label>
            <input type="date" class="form-input" id="weight-date">
          </div>
          <div class="form-group">
            <label class="form-label">時間</label>
            <input type="time" class="form-input" id="weight-time">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">體重（kg）*</label>
          <input type="number" class="form-input" id="weight-val" placeholder="例如：4.2" step="0.01" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">備註</label>
          <input type="text" class="form-input" id="weight-note" placeholder="選填…">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary flex-1" data-close="modal-weight">取消</button>
      <button class="btn btn-primary flex-1" id="btn-save-weight">儲存</button>
    </div>
  </div>
</div>

<!-- Reminder settings for cat -->
<div class="modal-overlay" id="modal-reminder">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="modal-reminder-title">提醒設定</span>
      <button class="modal-close" data-close="modal-reminder">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="reminder-cat-id">
      <div class="form-section">
        <div class="form-group">
          <label class="form-label">餵飯時間</label>
          <input type="time" class="form-input" id="remind-feed">
        </div>
        <div class="form-group">
          <label class="form-label">吃藥時間</label>
          <input type="time" class="form-input" id="remind-med">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">剪指甲週期（天）</label>
            <input type="number" class="form-input" id="remind-nail" placeholder="例如：30" min="1">
          </div>
          <div class="form-group">
            <label class="form-label">最後剪指甲</label>
            <input type="date" class="form-input" id="remind-nail-last">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">驅蟲週期（天）</label>
            <input type="number" class="form-input" id="remind-deworm" placeholder="例如：90" min="1">
          </div>
          <div class="form-group">
            <label class="form-label">最後驅蟲</label>
            <input type="date" class="form-input" id="remind-deworm-last">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">下次回診日期</label>
          <input type="date" class="form-input" id="remind-vet">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary flex-1" data-close="modal-reminder">取消</button>
      <button class="btn btn-primary flex-1" id="btn-save-reminder">儲存</button>
    </div>
  </div>
</div>

<!-- Backup range -->
<div class="modal-overlay" id="modal-backup-range">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">日期區間備份</span>
      <button class="modal-close" data-close="modal-backup-range">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">開始日期</label>
          <input type="date" class="form-input" id="backup-range-from">
        </div>
        <div class="form-group">
          <label class="form-label">結束日期</label>
          <input type="date" class="form-input" id="backup-range-to">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary flex-1" data-close="modal-backup-range">取消</button>
      <button class="btn btn-primary flex-1" id="btn-do-backup-range">匯出</button>
    </div>
  </div>
</div>

<!-- Backup month -->
<div class="modal-overlay" id="modal-backup-month">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">月份備份</span>
      <button class="modal-close" data-close="modal-backup-month">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">選擇月份</label>
        <input type="month" class="form-input" id="backup-month-val">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary flex-1" data-close="modal-backup-month">取消</button>
      <button class="btn btn-primary flex-1" id="btn-do-backup-month">匯出</button>
    </div>
  </div>
</div>

<!-- Backup by cat -->
<div class="modal-overlay" id="modal-backup-cat">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">依貓咪備份</span>
      <button class="modal-close" data-close="modal-backup-cat">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">選擇貓咪（可複選）</label>
        <div id="backup-cat-list" style="display:flex;flex-direction:column;gap:8px;margin-top:6px;"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary flex-1" data-close="modal-backup-cat">取消</button>
      <button class="btn btn-primary flex-1" id="btn-do-backup-cat">匯出</button>
    </div>
  </div>
</div>

<!-- Restore -->
<div class="modal-overlay" id="modal-restore">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">還原資料</span>
      <button class="modal-close" data-close="modal-restore">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">選擇 JSON 備份檔</label>
        <input type="file" class="form-input" id="restore-file" accept=".json" style="padding:8px;">
      </div>
      <div class="form-group">
        <label class="form-label">還原模式</label>
        <select class="form-input" id="restore-mode">
          <option value="merge">合併資料（保留現有）</option>
          <option value="overwrite">覆蓋現有資料</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary flex-1" data-close="modal-restore">取消</button>
      <button class="btn btn-primary flex-1" id="btn-do-restore">還原</button>
    </div>
  </div>
</div>

<!-- Last month report prompt -->
<div class="modal-overlay" id="modal-monthly-prompt">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="monthly-prompt-title">上月月報</span>
      <button class="modal-close" data-close="modal-monthly-prompt">✕</button>
    </div>
    <div class="modal-body">
      <p style="color:var(--text-2);font-size:.88rem;line-height:1.7;" id="monthly-prompt-text"></p>
    </div>
    <div class="modal-footer" style="flex-wrap:wrap;gap:8px;">
      <button class="btn btn-primary btn-sm flex-1" id="prompt-export-png">匯出 PNG</button>
      <button class="btn btn-secondary btn-sm flex-1" id="prompt-export-pdf">匯出 PDF</button>
      <button class="btn btn-ghost btn-sm w-full" id="prompt-later">稍後提醒</button>
    </div>
  </div>
</div>

<!-- Quick note modal -->
<div class="modal-overlay" id="modal-quick-note">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="quick-note-title">新增備註</span>
      <button class="modal-close" data-close="modal-quick-note">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">備註（選填）</label>
        <textarea class="form-input" id="quick-note-input" placeholder="輸入備註…" style="min-height:70px;"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary flex-1" id="quick-note-skip">跳過</button>
      <button class="btn btn-primary flex-1" id="quick-note-save">儲存</button>
    </div>
  </div>
</div>

<!-- Delete confirm -->
<div class="modal-overlay" id="modal-confirm">
  <div class="modal" style="border-radius:var(--radius-xl);">
    <div class="modal-handle"></div>
    <div class="modal-body" style="text-align:center;padding:24px 20px 16px;gap:8px;">
      <div style="font-size:2.5rem;" id="confirm-icon">⚠️</div>
      <div style="font-size:1rem;font-weight:700;color:var(--text);" id="confirm-title">確定要刪除？</div>
      <div style="font-size:.85rem;color:var(--text-2);" id="confirm-msg">此操作無法復原</div>
    </div>
    <div class="modal-footer">
